name: Source Monitor Telegram

on:
  workflow_dispatch:
    inputs:
      trigger_text:
        description: Trigger text included in Telegram report
        required: false
        type: string
        default: scheduled_or_manual
  schedule:
    # Tránh đúng phút 00 để giảm nguy cơ trễ do tải cao đầu giờ
    - cron: "19 * * * *"

concurrency:
  group: source-monitor-telegram
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FETCH_PROXY_BASE: ${{ secrets.FETCH_PROXY_BASE }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Python for local proxy
        if: ${{ env.FETCH_PROXY_BASE == '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start local fetch proxy
        if: ${{ env.FETCH_PROXY_BASE == '' }}
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cloudscraper
          nohup python3 plugin-dev-kit/local_fetch_proxy.py --port 8787 > /tmp/local_fetch_proxy.log 2>&1 &

          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8787/health > /dev/null; then
              echo "FETCH_PROXY_BASE=http://127.0.0.1:8787" >> "$GITHUB_ENV"
              echo "Local fetch proxy is ready."
              exit 0
            fi
            sleep 1
          done

          echo "::error::Local fetch proxy failed to start."
          tail -n 100 /tmp/local_fetch_proxy.log || true
          exit 1

      - name: Validate required secrets
        id: preflight
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          missing=0
          if [ -z "$TG_BOT_TOKEN" ]; then
            echo "::warning::Missing secret TG_BOT_TOKEN"
            missing=1
          fi
          if [ -z "$TG_CHAT_ID" ]; then
            echo "::warning::Missing secret TG_CHAT_ID"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "can_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monitor and send telegram
        if: steps.preflight.outputs.can_run == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
          MONITOR_TRIGGER_TEXT: ${{ github.event.inputs.trigger_text }}
        run: |
          attempts=0
          until [ "$attempts" -ge 3 ]; do
            node scripts/source-monitor-telegram.js --mode=report && exit 0
            attempts=$((attempts + 1))
            if [ "$attempts" -lt 3 ]; then
              echo "Attempt ${attempts} failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "::error::Monitor failed after 3 attempts."
          exit 1

      - name: Skip monitor (missing secrets)
        if: steps.preflight.outputs.can_run != 'true'
        run: echo "Monitor skipped because required Telegram secrets are missing."